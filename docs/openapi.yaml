openapi: 3.1.0
info:
  title: CXTMS Control Tower OS Public API
  version: 0.1.0
  description: Public workflow-backed APIs for partner visibility and issue reporting.
servers:
  - url: https://demo.cxtms-control-tower.local
paths:
  /public/shipments/{reference}:
    get:
      summary: Track shipment by reference
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shipment visibility payload
  /public/issues:
    post:
      summary: Report a shipment issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reference
                - reporter
                - message
              properties:
                reference:
                  type: string
                reporter:
                  type: string
                message:
                  type: string
      responses:
        "201":
          description: Workflow accepted
